# Build, package, and publish a free bar-helper release to GitHub, then update
# the Homebrew cask (REQ-C11).
#
# bar-helper is free and open source with no paid Apple Developer ID: the app
# is ad-hoc signed (not notarized), and users clear Gatekeeper on first launch.
# There are no signing secrets to configure — this workflow runs as-is.
#
# Triggered by pushing a tag like `v0.1.0`.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Test
        run: swift test

      - name: Package (ad-hoc signed)
        run: scripts/package-app.sh "${GITHUB_REF_NAME#v}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bar-helper-*.zip
            dist/bar-helper-*.zip.sha256

      # Update the in-repo cask's version + checksum to match the release, then
      # commit it back to the default branch so `brew upgrade` sees the bump.
      - name: Update cask
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="$(awk '{print $1}' dist/bar-helper-${VERSION}.zip.sha256)"
          /usr/bin/sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" Casks/bar-helper.rb
          /usr/bin/sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" Casks/bar-helper.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/bar-helper.rb
          git commit -m "cask: bar-helper ${VERSION}" || { echo "no cask change"; exit 0; }
          # Tags are cut from main, so the new cask commit fast-forwards main.
          git push origin HEAD:main
